<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Select Language</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* 🌌 Background */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#fce3d4,#f8f2e7,#f3d1c4);
  font-family: Georgia, serif;
  overflow:hidden;
  position: relative; /* ✅ important */
}

/* ✨ Floating light blobs */
body::before, 
body::after{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  background: radial-gradient(circle, rgba(255,100,100,0.4), transparent);
  filter: blur(80px);
  animation: float 6s infinite alternate;
  
  pointer-events: none; /* ✅ FIX: allows button clicks */
  z-index: 0; /* keep behind */
}

body::after{
  right:0;
  bottom:0;
  background: radial-gradient(circle, rgba(255,200,150,0.4), transparent);
}

@keyframes float{
  from{ transform: translateY(0px);}
  to{ transform: translateY(40px);}
}

/* 💎 Glass Card */
.lang-box{
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.25);
  border:1px solid rgba(255,255,255,0.3);
  padding:45px 30px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.2);
  text-align:center;
  max-width:400px;
  width:100%;
  animation: fadeIn 1s ease;

  position: relative;
  z-index: 1; /* ✅ bring above blobs */
}

/* Title */
.lang-box h3{
  margin-bottom:25px;
  color:#b33c3c;
  font-weight:bold;
}

/* Buttons */
.btn-lang{
  padding:14px;
  border-radius:30px;
  font-weight:bold;
  margin-top:12px;
  transition:0.3s;
  letter-spacing:1px;
  cursor:pointer; /* ✅ better UX */
}

/* Hover */
.btn-lang:hover{
  transform:scale(1.08);
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* Tap feedback (mobile) */
.btn-lang:active{
  transform:scale(0.95);
}

/* Button styles */
.btn-danger{
  background: linear-gradient(45deg,#ff4d4d,#b33c3c);
  border:none;
}

.btn-dark{
  background: linear-gradient(45deg,#333,#000);
  border:none;
}

/* Fade animation */
@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div class="lang-box">
  <h3>🌐மொழியைத் தேர்ந்தெடுக்கவும்</h3>

  <button class="btn btn-danger w-100 btn-lang" onclick="selectLang('ta')">
    தமிழ்
  </button>

  <button class="btn btn-dark w-100 btn-lang" onclick="selectLang('en')">
    English
  </button>
</div>

<script>
function selectLang(lang){
  localStorage.setItem("lang", lang);
  window.location.href = "welcome.html";
}
</script>

</body>
</html>
