<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Select Language</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* =========================
   BODY
========================= */

body{

  margin:0;

  height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  overflow:hidden;

  position:relative;

  font-family:Georgia, serif;

  background:
  radial-gradient(
    circle at top,
    #8454a1,
    #2a0f3f 70%
  );
}

/* GOLD LIGHT GLOW */
body::before{

  content:"";

  position:absolute;

  inset:0;

  background:
    radial-gradient(circle at 20% 30%,
    rgba(255,215,0,0.08),
    transparent 40%),

    radial-gradient(circle at 80% 70%,
    rgba(255,215,0,0.08),
    transparent 40%);

  pointer-events:none;
}

/* =========================
   STARS
========================= */

.stars{

  position:absolute;

  width:100%;
  height:100%;

  top:0;
  left:0;

  overflow:hidden;

  z-index:1;
}

/* SINGLE STAR */
.star{

  position:absolute;

  width:4px;
  height:4px;

  background:#ffd700;

  border-radius:50%;

  box-shadow:
    0 0 10px #ffd700,
    0 0 20px #ffd700;

  animation:
    twinkle 2s infinite ease-in-out;
}

/* TWINKLE */
@keyframes twinkle{

  0%,100%{
    opacity:0.2;
    transform:scale(0.5);
  }

  50%{
    opacity:1;
    transform:scale(1.5);
  }
}

/* =========================
   MOON
========================= */

.moon{

  position:absolute;

  top:60px;
  right:60px;

  width:110px;
  height:110px;

  border-radius:50%;

  background:
  radial-gradient(circle at 30% 30%,
  #fff8dc,
  #f4d03f 70%);

  box-shadow:
    0 0 40px rgba(255,215,0,0.5),
    0 0 80px rgba(255,215,0,0.3);

  z-index:1;
}

/* MOON CRATER */
.moon::before{

  content:"";

  position:absolute;

  width:18px;
  height:18px;

  border-radius:50%;

  background:rgba(255,255,255,0.25);

  top:25px;
  left:35px;
}

/* =========================
   GLASS CARD
========================= */

.lang-box{

  position:relative;

  z-index:5;

  width:90%;
  max-width:420px;

  padding:45px 30px;

  border-radius:30px;

  text-align:center;

  background:
  rgba(255,255,255,0.06);

  backdrop-filter:blur(15px);

  border:1px solid rgba(255,215,0,0.2);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.4),
    0 0 25px rgba(255,215,0,0.08);

  animation:
  fadeIn 1.2s ease;
}

/* GOLD BORDER EFFECT */
.lang-box::before{

  content:"";

  position:absolute;

  inset:0;

  border-radius:30px;

  padding:1px;

  background:linear-gradient(
    120deg,
    #d4af37,
    #fff2b0,
    #caa85c,
    #fff2b0,
    #d4af37
  );

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);

  -webkit-mask-composite:xor;

  mask-composite:exclude;

  opacity:0.5;
}

/* =========================
   TITLE
========================= */

.lang-box h3{

  margin-bottom:30px;

  font-size:32px;

  font-weight:bold;

  background: linear-gradient(
    120deg,
    #d4af37,
    #fff2b0,
    #caa85c,
    #fff2b0,
    #d4af37
  );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 10px rgba(255,215,0,0.4);
}

/* =========================
   BUTTONS
========================= */

.btn-lang{

  position:relative;

  overflow:hidden;

  margin-top:18px;

  padding:15px;

  border:none;

  border-radius:50px;

  font-size:18px;

  font-weight:bold;

  letter-spacing:1px;

  color:#fff;

  cursor:pointer;

  transition:0.4s;

  background:
  rgba(255,255,255,0.08);

  backdrop-filter:blur(10px);

  box-shadow:
  0 8px 20px rgba(0,0,0,0.3);
}

/* GOLD BORDER */
.btn-lang::before{

  content:"";

  position:absolute;

  inset:0;

  border-radius:50px;

  padding:1px;

  background:linear-gradient(
    120deg,
    #d4af37,
    #fff2b0,
    #caa85c,
    #fff2b0,
    #d4af37
  );

  background-size:300% 300%;

  animation:
  goldMove 4s linear infinite;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);

  -webkit-mask-composite:xor;

  mask-composite:exclude;
}

/* HOVER */
.btn-lang:hover{

  transform:
  translateY(-4px)
  scale(1.05);

  box-shadow:
  0 15px 40px rgba(255,215,0,0.4);
}

/* CLICK */
.btn-lang:active{
  transform:scale(0.95);
}

/* =========================
   ANIMATIONS
========================= */

@keyframes goldMove{

  0%{
    background-position:0%;
  }

  100%{
    background-position:300%;
  }
}

@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(40px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* =========================
   MOBILE
========================= */

@media(max-width:600px){

  .lang-box{

    padding:35px 20px;
  }

  .lang-box h3{

    font-size:24px;
  }

  .btn-lang{

    font-size:16px;
    padding:13px;
  }

  .moon{

    width:80px;
    height:80px;

    top:25px;
    right:25px;
  }

}

</style>
</head>

<body>

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- MOON -->
<div class="moon"></div>

<!-- LANGUAGE CARD -->
<div class="lang-box">

  <h3>
    🌐 மொழியைத் தேர்ந்தெடுக்கவும்
  </h3>

  <button
    class="btn-lang w-100"
    onclick="selectLang('ta')">

    தமிழ்

  </button>

  <button
    class="btn-lang w-100"
    onclick="selectLang('en')">

    English

  </button>

</div>

<script>

/* STARS */
const stars =
document.getElementById("stars");

for(let i=0; i<60; i++){

  const star =
  document.createElement("div");

  star.classList.add("star");

  star.style.top =
  Math.random()*100 + "%";

  star.style.left =
  Math.random()*100 + "%";

  star.style.animationDelay =
  Math.random()*3 + "s";

  star.style.width =
  2 + Math.random()*4 + "px";

  star.style.height =
  star.style.width;

  stars.appendChild(star);
}

/* LANGUAGE */
function selectLang(lang){

  localStorage.setItem("lang", lang);

  window.location.href =
  "welcome.html";
}

</script>

</body>
</html>
