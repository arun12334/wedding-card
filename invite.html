<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f8f2e7;
  font-family:Georgia;
  text-align:center;
}

.card-box{
  margin-top:100px;
  background:#fff;
  padding:30px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.tamil-text{
  margin-top:20px;
  font-size:18px;
  line-height:1.8;
  color:#5a3e1b;
}
</style>
</head>

<body>

<div class="container">
  <div class="card-box">

    <h4 id="welcomeName"></h4>

    <div class="tamil-text" id="inviteText"></div>

  </div>
</div>

<script>
let name = localStorage.getItem("inviteName");

document.getElementById("welcomeName").innerHTML = "💐 " + name + " அவர்களுக்கு";

document.getElementById("inviteText").innerHTML = `
சுற்றமும் உறவுகளும் சூழ,<br>
அன்பும் மகிழ்ச்சியும் நிரம்ப,<br><br>

<strong>${name}</strong> அவர்களும்<br>
உங்கள் குடும்ப உறுப்பினர்களும்<br><br>

எங்கள் திருமண விழாவிற்கு<br>
அன்புடன் வரவேற்கப்படுகிறீர்கள் 💐
`;
</script>

</body>
</html>
