<!DOCTYPE html>
<html lang="en">
  <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Letter</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

    <style>

body{
background:#f8f2e7;
text-align:center;
font-family:Georgia;
}

/* scroll */

.scroll-container {
    position: relative;
    background-image: url(assets/olai.jpeg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    width: 100%;
    height: 100%;
    margin: auto;
    margin-top: 60px;
}

/* 🧾 scroll opening animation */
.scroll-container {
  transform: scaleY(0);
  transform-origin: top;
  animation: openScroll 1.5s ease forwards;
}

/* animation keyframes */
@keyframes openScroll {
  0% {
    transform: scaleY(0);
    opacity: 0;
  }
  60% {
    transform: scaleY(1.05);
    opacity: 1;
  }
  100% {
    transform: scaleY(1);
  }
}

.scroll-img{
width:100%;
}

/* text area */

.scroll-text {
    top: 140px;
    left: 65px;
    right: 65px;
    height: 80vh;
    width: 100%;
    padding: 105px 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 17px;
    line-height: 1.7;
    text-align: center;
    color: #3a2a16;
}

/* typing area */

.typing{
white-space:pre-wrap;
overflow-y:auto;
padding-right:5px;
scrollbar-width: none;
}

/* button */

.surprise-btn{
display:none;
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:8px 20px;
font-size:15px;
}

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

/* make your content above confetti */
.scroll-container{
position:relative;
z-index:1;
}


@media(min-width:768px){

.scroll-container{
background-size:contain; /* ✅ no stretch */
max-width:420px;         /* center width */
height:650px;            /* fixed height */
margin:40px auto;
}

}


</style>

  </head>

  <body>

    <div style="position:absolute; top:20px; right:20px;">
  <button class="btn btn-sm btn-outline-dark" onclick="setLang('en')">EN</button>
  <button class="btn btn-sm btn-outline-danger" onclick="setLang('ta')">தமிழ்</button>
</div>
    <canvas id="confetti"></canvas>

    <audio id="bgMusic" src="assets/music.mp3" loop></audio>

    <div style="margin-left: 20px; margin-right: 20px;">
      <div class="scroll-container ">

        <div class="scroll-text" style="overflow: hidden;">

          <div id="text" class="typing "></div>

        </div>
 

      </div>
    </div>

    <script>
const bgm = document.getElementById("bgMusic");

let lang = localStorage.getItem("lang") || "en";

if(lang === "ta"){

எங்கள் திருமண விழாவை பற்றி உங்களுக்கு 
தெரிவிப்பதில் நாங்கள் மகிழ்ச்சி அடைகிறோம்

❤️ அருண் குமார்

❤️ உமா பாரதி R 

📅 Date : 29 மே 2026, காலை 6:00 மணிக்கு

இனிதே நடைபெற உள்ளது.

இந்த மகிழ்ச்சியான தருணத்தில்
${name} உங்களையும் மற்றும் உங்கள் குடும்பத்தினர்
கலந்து கொண்டு எங்களை ஆசீர்வதிக்குமாறு
அன்புடன் கேட்டுக் கொள்கிறோம். ❤️`;
}



else {
  message = `Hi ${name},

We are happy to inform you about our wedding ceremony.

${name}, you and your family members are heartily invited to join us and celebrate this special occasion.

let i=0

function typeWriter(){

let textBox = document.getElementById("text")

if(i < message.length){

textBox.textContent += message.charAt(i)

i++

/* auto scroll */
textBox.scrollTop = textBox.scrollHeight

setTimeout(typeWriter,85)

}else{
   setTimeout(() => {

      const bgm = document.getElementById("bgMusic");
      if(bgm){
        bgm.pause();
        bgm.currentTime = 0;
      }

      localStorage.removeItem("musicAllowed"); // 🔥 reset

      window.location.href = "envlop.html";

window.onload = () => {

  setTimeout(() => {
    document.querySelector(".scroll-text").style.opacity = "1";

    const allowed = localStorage.getItem("musicAllowed");

    if(allowed === "true"){

      // try play
      bgm.play().then(()=>{

          bgm.play();
        }, { once: true });
      });

    typeWriter();

  }, 1500);

function goGift(){

window.location.href="envlop.html"

}



</script>

    <script>
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* 🎉 CONFETTI */
let confetti = [];
for(let i=0;i<80;i++){
  confetti.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*6 + 2,
    d: Math.random()*50,
    color: `hsl(${Math.random()*360},100%,50%)`
  });
}

/* ❤️ HEARTS */
let hearts = [];
for(let i=0;i<30;i++){
  hearts.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*12 + 8,
    speedY: Math.random()*1 + 0.5,
    speedX: Math.random()*0.5 - 0.25,
    rotation: Math.random()*360
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* 🎉 DRAW CONFETTI */
  confetti.forEach((c,i)=>{
    ctx.beginPath();
    ctx.fillStyle = c.color;
    ctx.fillRect(c.x, c.y, c.r, c.r);

    c.y += Math.cos(c.d) + 2;
    c.x += Math.sin(c.d);

    if(c.y > canvas.height){
      confetti[i].y = -10;
      confetti[i].x = Math.random()*canvas.width;
    }
  });

  /* ❤️ DRAW HEARTS */
  hearts.forEach((h,i)=>{
    ctx.save();
    ctx.translate(h.x, h.y);
    ctx.rotate(h.rotation * Math.PI/180);

    ctx.fillStyle = "#c94c4c";
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(-h.size/2,-h.size/2,-h.size,h.size/2,0,h.size);
    ctx.bezierCurveTo(h.size,h.size/2,h.size/2,-h.size/2,0,0);
    ctx.fill();

    ctx.restore();

    h.y += h.speedY;
    h.x += h.speedX;
    h.rotation += 0.5;

    if(h.y > canvas.height){
      hearts[i].y = -10;
      hearts[i].x = Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(draw);
}

draw();

/* resize */
window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});


function setLang(selectedLang){
  localStorage.setItem("lang", selectedLang);
  location.reload();
}
</script>

  </body>
</html>
