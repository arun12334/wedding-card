<!DOCTYPE html>
<html lang="en">
  <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Letter</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

       <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>

body{
background:#f8f2e7;
text-align:center;
font-family:Georgia;
}

/* scroll */

/* scroll */

.scroll-container {
  position: relative;
  background: linear-gradient(135deg,#f3efff,#e6ddff);
  border-radius: 25px;
  box-shadow: 
    0 20px 50px rgba(0,0,0,0.15),
    inset 0 0 10px rgba(255,255,255,0.6);
  border: 2px solid rgba(255,255,255,0.6);

  max-width: 420px;
  height: 650px;
  margin: 60px auto;
  padding: 25px;
  overflow: hidden;

}

/* 💎 GOLD INNER BORDER */
.scroll-container::before{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:20px;
  border:1px solid rgba(180,138,44,0.4);
  pointer-events:none;
}

/* 🧾 scroll opening animation */
.scroll-container {
  transform: scaleY(0);
  transform-origin: top;
  animation: openScroll 1.5s ease forwards;
}

/* animation keyframes */
@keyframes openScroll {
  0% {
    transform: scaleY(0);
    opacity: 0;
  }
  60% {
    transform: scaleY(1.05);
    opacity: 1;
  }
  100% {
    transform: scaleY(1);
  }
}

.scroll-img{
width:100%;
}

/* text area */

.scroll-text {
  height: 100%;
  padding: 10px 10px;
  font-size: 16px;
  line-height: 1.9;
  text-align: center;
  color: #4b3b75;
 font-family: 'Poppins', sans-serif
}

/* typing area */

.typing{
white-space:pre-wrap;
overflow-y:auto;
padding-right:5px;
scrollbar-width: none;
}

/* button */

.surprise-btn{
display:block;
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
padding:10px 25px;
font-size:15px;
border-radius:25px;
background:linear-gradient(135deg,#7b5cff,#b9a7ff);
border:none;
color:white;
box-shadow:0 5px 15px rgba(123,92,255,0.4);
}

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

/* make your content above confetti */
.scroll-container{
position:relative;
z-index:1;
}


@media(min-width:768px){

.scroll-container{
background-size:contain; /* ✅ no stretch */
max-width:420px;         /* center width */
height:650px;            /* fixed height */
margin:40px auto;
}

}

.title{
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  letter-spacing: 2px;
  color: #b48a2c; /* gold */
  margin-bottom: 15px;
  margin-top: 200px;
}
.hide-title{
  opacity: 0;
  transform: translateY(-20px);
  transition: all 0.6s ease;
}

/* 👇 NEW (remove space completely) */
.remove-title{
  display: none;
}


</style>

  </head>

  <body>

    <div style="position:absolute; top:20px; right:20px;">
  <button class="btn btn-sm btn-outline-dark" onclick="setLang('en')">EN</button>
  <button class="btn btn-sm btn-outline-danger" onclick="setLang('ta')">தமிழ்</button>
</div>
    <canvas id="confetti"></canvas>

    <audio id="bgMusic" src="assets/music.mp3" loop></audio>

    <div style="margin-left: 20px; margin-right: 20px;">

      <div class="scroll-container ">

        <div class="scroll-text" style="overflow: hidden;">
          <div class="title" id="wdtit"> Wedding Invitation </div>


          <div id="text" class="typing "></div>

        </div>
 
   <button class="btn btn-danger surprise-btn" id="openBtn" onclick="goGift()">
  Open Invitation
</button>
      </div>
    </div>

    <script>
const bgm = document.getElementById("bgMusic");

let lang = localStorage.getItem("lang") || "en";
let name = localStorage.getItem("inviteName");
let message = "";

if(lang === "ta"){
  message = `  
அன்புடையீர்  ${name} 
அவர்களுக்கு,

எங்கள் திருமண விழாவை பற்றி உங்களுக்கு 
தெரிவிப்பதில் நாங்கள் மகிழ்ச்சி அடைகிறோம்

இந்த மகிழ்ச்சியான தருணத்தில்
${name} உங்களையும் மற்றும் உங்கள் குடும்பத்தினர்
கலந்து கொண்டு எங்களை ஆசீர்வதிக்குமாறு
அன்புடன் கேட்டுக் கொள்கிறோம். ❤️`;
}



else {
  message = `
  Dear ${name},
We are happy to inform you about our wedding ceremony.

${name}, you and your family members are heartily invited to join us and celebrate this special occasion.

We look forward to your presence, love, and blessings on our special day 💐❤️`;
}

let i=0

function typeWriter(){

let textBox = document.getElementById("text")

if(i < message.length){

textBox.textContent += message.charAt(i)

i++

/* auto scroll */
textBox.scrollTop = textBox.scrollHeight

setTimeout(typeWriter,63)

}else{
   setTimeout(() => {

      // ✅ STOP MUSIC BEFORE NAVIGATION
      const bgm = document.getElementById("bgMusic");
      if(bgm){
        bgm.pause();
        bgm.currentTime = 0;
      }

      localStorage.removeItem("musicAllowed"); // 🔥 reset

      window.location.href = "invite-card.html";

    }, 2000);
}

}

window.onload = () => {

  setTimeout(() => {
    document.querySelector(".scroll-text").style.opacity = "1";

    const allowed = localStorage.getItem("musicAllowed");

    if(allowed === "true"){

      // try play
      bgm.play().then(()=>{
        console.log("Music started");
      }).catch(()=>{
        console.log("Autoplay blocked, waiting interaction");

        // fallback: play on first touch
        document.addEventListener("click", () => {
          bgm.play();
        }, { once: true });
      });

    }

    // first fade
const title = document.getElementById("wdtit");

title.classList.add("hide-title");

// then REMOVE completely after animation
setTimeout(() => {
  title.classList.add("remove-title");
}, 200); // match CSS transition time

    typeWriter();

  }, 1500);
};

function goGift(){

window.location.href="invite-card.html"

}



</script>

    <script>
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* 🎉 CONFETTI */
let confetti = [];
for(let i=0;i<80;i++){
  confetti.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*6 + 2,
    d: Math.random()*50,
    color: `hsl(${Math.random()*360},100%,50%)`
  });
}

/* ❤️ HEARTS */
let hearts = [];
for(let i=0;i<30;i++){
  hearts.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*12 + 8,
    speedY: Math.random()*1 + 0.5,
    speedX: Math.random()*0.5 - 0.25,
    rotation: Math.random()*360
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* 🎉 DRAW CONFETTI */
  confetti.forEach((c,i)=>{
    ctx.beginPath();
    ctx.fillStyle = c.color;
    ctx.fillRect(c.x, c.y, c.r, c.r);

    c.y += Math.cos(c.d) + 2;
    c.x += Math.sin(c.d);

    if(c.y > canvas.height){
      confetti[i].y = -10;
      confetti[i].x = Math.random()*canvas.width;
    }
  });

  /* ❤️ DRAW HEARTS */
  hearts.forEach((h,i)=>{
    ctx.save();
    ctx.translate(h.x, h.y);
    ctx.rotate(h.rotation * Math.PI/180);

    ctx.fillStyle = "#c94c4c";
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(-h.size/2,-h.size/2,-h.size,h.size/2,0,h.size);
    ctx.bezierCurveTo(h.size,h.size/2,h.size/2,-h.size/2,0,0);
    ctx.fill();

    ctx.restore();

    h.y += h.speedY;
    h.x += h.speedX;
    h.rotation += 0.5;

    if(h.y > canvas.height){
      hearts[i].y = -10;
      hearts[i].x = Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(draw);
}

draw();

/* resize */
window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});


function setLang(selectedLang){
  localStorage.setItem("lang", selectedLang);
  location.reload();
}




function applyLanguage(){

  let lang = localStorage.getItem("lang") || "en";

  if(lang === "ta"){

    
    document.getElementById("openBtn").innerText = "அழைப்பிதழ் திறக்க";
    document.getElementById("wdtit").innerText = "திருமண அழைப்பிதழ்";

 

  } else {

     // 👉 English images
      document.getElementById("openBtn").innerText = " Open Invitation";

   
  
  }
}

applyLanguage();
</script>

</html>
