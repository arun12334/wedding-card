<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="திருமண அழைப்பிதழ் ❤️" />
<meta property="og:description" content="You are invited to our special day. Join us for the celebration!" />
<meta property="og:image" content="https://raw.githubusercontent.com/arun12334/cards/refs/heads/main/assets/welcome-image.jpg"/>
<meta property="og:url" content="https://arunaakash-114.github.io/surprise/" />
<meta property="og:type" content="website" />

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<title>Gift Box</title>

<style>

/* =========================
   BODY
========================= */

body{

  margin:0;
  overflow:hidden;

  font-family:Georgia;

  height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  position:relative;

  background:
  radial-gradient(
    circle at top,
    #8454a1,
    #2a0f3f 70%
  );
}

/* GOLD LIGHT EFFECT */
body::before{

  content:"";

  position:absolute;
  inset:0;

  background:
    radial-gradient(circle at 20% 30%,
    rgba(255,215,0,0.08),
    transparent 40%),

    radial-gradient(circle at 80% 70%,
    rgba(255,215,0,0.08),
    transparent 40%);

  pointer-events:none;
}

/* =========================
   STARS
========================= */

.stars{

  position:absolute;

  width:100%;
  height:100%;

  top:0;
  left:0;

  overflow:hidden;
}

/* SINGLE STAR */
.star{

  position:absolute;

  width:4px;
  height:4px;

  background:#ffd700;

  border-radius:50%;

  box-shadow:
    0 0 10px #ffd700,
    0 0 20px #ffd700;

  animation:
    twinkle 2s infinite ease-in-out;
}

/* STAR ANIMATION */
@keyframes twinkle{

  0%,100%{
    opacity:0.2;
    transform:scale(0.5);
  }

  50%{
    opacity:1;
    transform:scale(1.5);
  }
}

/* =========================
   MOON
========================= */

.moon{

  position:absolute;

  top:60px;
  right:60px;

  width:120px;
  height:120px;

  border-radius:50%;

  background:
  radial-gradient(circle at 30% 30%,
  #fff8dc,
  #f4d03f 70%);

  box-shadow:
    0 0 40px rgba(255,215,0,0.5),
    0 0 80px rgba(255,215,0,0.3);
}

/* MOON CRATER */
.moon::before{

  content:"";

  position:absolute;

  width:20px;
  height:20px;

  border-radius:50%;

  background:rgba(255,255,255,0.25);

  top:25px;
  left:35px;
}

/* =========================
   CENTER CONTENT
========================= */

.container{

  position:relative;
  z-index:5;

  text-align:center;
}

/* =========================
   GIFT IMAGE
========================= */

.gift-img {

    width: 180px;

    cursor: pointer;

    transition: transform 0.3s;

    animation:
    shake-medium 0.5s ease-in-out infinite,
    glowGift 2s infinite alternate;
}

/* SHAKE */
@keyframes shake-medium {
    0%   { transform: translate(0px, 0px) rotate(0deg); }
    10%  { transform: translate(-3px, -2px) rotate(-2deg); }
    20%  { transform: translate(3px, -2px) rotate(2deg); }
    30%  { transform: translate(-3px, 2px) rotate(-2deg); }
    40%  { transform: translate(3px, 2px) rotate(2deg); }
    50%  { transform: translate(-2px, -1px) rotate(-1deg); }
    60%  { transform: translate(2px, -1px) rotate(1deg); }
    70%  { transform: translate(-2px, 1px) rotate(-1deg); }
    80%  { transform: translate(2px, 1px) rotate(1deg); }
    90%  { transform: translate(-1px, -1px) rotate(-1deg); }
    100% { transform: translate(0px, 0px) rotate(0deg); }
}

/* GLOW */
@keyframes glowGift{

  from{
    filter:
    drop-shadow(0 0 10px rgba(255,215,0,0.4));
  }

  to{
    filter:
    drop-shadow(0 0 25px rgba(255,215,0,0.9));
  }
}

.gift-img:hover{
    transform:scale(1.08);
}

/* =========================
   TEXT
========================= */

.gift-text {

    font-family:'Great Vibes', cursive;

    font-size:42px;

    margin-top:20px;

    background: linear-gradient(
      120deg,
      #d4af37,
      #fff2b0,
      #caa85c,
      #fff2b0,
      #d4af37
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
      0 0 10px rgba(255,215,0,0.5);
}

/* =========================
   BUTTON
========================= */

.open-btn {

    margin-top: 25px;

    padding: 14px 35px;

    font-size: 18px;

    border:none;

    border-radius:50px;

    cursor:pointer;

    position:relative;

    overflow:hidden;

    color:#fff;

    letter-spacing:1px;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    box-shadow:
    0 10px 30px rgba(0,0,0,0.4);

    transition:0.4s;
}

/* GOLD BORDER */
.open-btn::before {

    content:"";

    position:absolute;

    inset:0;

    border-radius:50px;

    padding:1px;

    background:linear-gradient(
      120deg,
      #d4af37,
      #fff2b0,
      #caa85c,
      #fff2b0,
      #d4af37
    );

    background-size:300% 300%;

    animation:goldMove 4s linear infinite;

    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);

    -webkit-mask-composite:xor;

    mask-composite:exclude;
}

/* GOLD ANIMATION */
@keyframes goldMove{

  0%{
    background-position:0%;
  }

  100%{
    background-position:300%;
  }
}

/* HOVER */
.open-btn:hover{

  transform:
  translateY(-4px)
  scale(1.05);

  box-shadow:
  0 15px 40px rgba(255,215,0,0.4);
}

/* =========================
   MOBILE
========================= */

@media(max-width:600px){

  .gift-img{
    width:150px;
  }

  .gift-text{
    font-size:34px;
    padding:0 15px;
  }

  .moon{
    width:80px;
    height:80px;
    top:30px;
    right:30px;
  }

}

</style>
</head>

<body>

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- MOON -->
<div class="moon"></div>

<!-- CONTENT -->
<div class="container">

  <!-- GIFT -->
  <img
    src="assets/gif.png"
    class="gift-img"
    id="giftImg">

  <!-- TEXT -->
  <p class="gift-text">
    Open to see the Surprise
  </p>

  <!-- BUTTON -->
  <button class="open-btn" id="openBtn">
    ✨ Open Invitation
  </button>

</div>

<script>

/* STARS */
const stars =
document.getElementById("stars");

for(let i=0; i<60; i++){

  const star =
  document.createElement("div");

  star.classList.add("star");

  star.style.top =
  Math.random()*100 + "%";

  star.style.left =
  Math.random()*100 + "%";

  star.style.animationDelay =
  Math.random()*3 + "s";

  star.style.width =
  2 + Math.random()*4 + "px";

  star.style.height =
  star.style.width;

  stars.appendChild(star);
}

/* OPEN */
openBtn.onclick = () => {

 window.location.href =
 "language.html";

};

</script>

</body>
</html>
